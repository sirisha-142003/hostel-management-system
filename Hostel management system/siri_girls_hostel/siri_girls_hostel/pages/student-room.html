<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Room – Siri Girls Hostel</title><link rel="stylesheet" href="../css/style.css"/>
<style>
.amenity-chip { display:inline-flex; align-items:center; gap:6px; background:var(--rose-pale); border:1px solid var(--border2); border-radius:50px; padding:6px 14px; font-size:12px; color:var(--rose-dark); margin:4px; font-weight:500; }
.roommate-card { background:var(--cream2); border:1px solid var(--border); border-radius:var(--radius-md); padding:16px 18px; display:flex; align-items:center; gap:14px; }
</style></head>
<body><div class="app-layout" id="appRoot"></div>
<script src="../js/app.js"></script><script src="../js/sidebar.js"></script>
<script>
const sess = requireAuth('student');
if (sess) {
  const student  = getStudents().find(s => s.id === sess.id);
  if (!student) { clearSession(); window.location.href = '../index.html'; }
  const room     = getRooms().find(r => r.num === student.room) || {};
  const allStudents = getStudents();
  const roommates   = allStudents.filter(s => s.room === student.room && s.id !== student.id);

  const amenitiesList = (room.amenities || 'Wi-Fi, Wardrobe, Desk').split(',').map(a => a.trim());
  const allAmenities  = ['🛏️ Bed & Mattress', '🪑 Study Table & Chair', '🗄️ Wardrobe', '💡 LED Lighting', '🔌 Power Sockets (4×)', '📶 Wi-Fi Router', '🪟 Window with Curtains'];

  document.getElementById('appRoot').innerHTML = `
    ${buildStudentSidebar('room')}
    <div class="main-area">
      <div class="topbar">
        <div><div class="topbar-title">My Room</div><div class="topbar-sub">Room ${student.room} · Siri Girls Hostel</div></div>
      </div>
      <div class="content">

        <!-- Room Info Card -->
        <div class="card mb-24">
          <div class="card-header">
            <span class="card-title">Room Details</span>
            <span class="badge badge-rose" style="font-size:14px;padding:6px 16px">${student.room}</span>
          </div>
          <div class="card-body">
            <div class="info-grid mb-24">
              <div class="info-item"><div class="info-label">Room Number</div><div class="info-value mono text-rose" style="font-size:1.4rem;font-family:'Cormorant Garamond',serif;font-weight:700">${student.room}</div></div>
              <div class="info-item"><div class="info-label">Type</div><div class="info-value">${room.type || student.type} Sharing</div></div>
              <div class="info-item"><div class="info-label">Floor</div><div class="info-value">${room.floor || student.floor}</div></div>
              <div class="info-item"><div class="info-label">Monthly Rent</div><div class="info-value mono" style="color:var(--gold)">₹${room.rent ? room.rent.toLocaleString('en-IN') : '—'}</div></div>
              <div class="info-item"><div class="info-label">Status</div><div class="info-value"><span class="badge badge-green">Occupied</span></div></div>
              <div class="info-item"><div class="info-label">Allotted On</div><div class="info-value mono">${fmtDate(student.joinDate)}</div></div>
            </div>

            <hr class="divider"/>
            <div style="font-weight:600;font-size:15px;margin-bottom:14px">🛋️ Room Furnishings &amp; Amenities</div>
            <div style="margin-bottom:8px">
              ${amenitiesList.map(a => `<span class="amenity-chip">✓ ${a}</span>`).join('')}
              ${allAmenities.map(a => `<span class="amenity-chip">${a}</span>`).join('')}
            </div>
          </div>
        </div>

        <!-- Roommates -->
        <div class="card mb-24">
          <div class="card-header"><span class="card-title">👯 Roommates</span><span class="badge badge-rose">${roommates.length} roommate${roommates.length!==1?'s':''}</span></div>
          <div class="card-body">
            ${roommates.length ? roommates.map(r => `
              <div class="roommate-card mb-8">
                <div class="s-avatar">${r.name[0]}</div>
                <div>
                  <div style="font-weight:600">${r.name}</div>
                  <div style="font-size:12px;color:var(--muted)">${r.id} · ${r.college}</div>
                  <div style="font-size:12px;color:var(--muted)">📞 ${r.phone}</div>
                </div>
              </div>`).join('') :
              `<div class="alert alert-info">You are the sole occupant of this room currently.</div>`}
          </div>
        </div>

        <!-- House Rules -->
        <div class="card">
          <div class="card-header"><span class="card-title">📜 Room Rules</span></div>
          <div class="card-body">
            <ul style="list-style:none;display:flex;flex-direction:column;gap:10px">
              ${['Lights out by 11:00 PM on weekdays.',
                 'No male visitors allowed inside the hostel premises.',
                 'Keep your room clean. Housekeeping visits every morning.',
                 'No cooking inside the room. Use the mess or cafeteria.',
                 'Report any damage or maintenance issues promptly.',
                 'Curfew timing: 9:30 PM. Entry after curfew requires warden approval.',
                 'No loud music or disturbances after 10:00 PM.']
                .map(r => `<li style="display:flex;gap:10px;font-size:14px;color:var(--ink2)"><span style="color:var(--rose);flex-shrink:0">✦</span>${r}</li>`).join('')}
            </ul>
          </div>
        </div>

      </div>
    </div>`;
}
</script></body></html>
